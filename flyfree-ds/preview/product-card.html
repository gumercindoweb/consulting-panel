<!DOCTYPE html>
<!-- @dsCard group="Components" name="Product Card" subtitle="Ecommerce product card with badge, price, add-to-cart" viewport="700x200" -->
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: "FuturaStd"; src: url("../fonts/FuturaStd-Book.otf") format("opentype"); font-weight: 400; }
  @font-face { font-family: "FuturaStd"; src: url("../fonts/FuturaStd-Bold.otf") format("opentype"); font-weight: 700; }
  @font-face { font-family: "FuturaStdCondensed"; src: url("../fonts/FuturaStd-CondensedExtraBd.otf") format("opentype"); font-weight: 900; }
  @font-face { font-family: "FuturaStdCondensed"; src: url("../fonts/FuturaStd-CondensedBold.otf") format("opentype"); font-weight: 700; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f5; padding: 20px; display: flex; gap: 16px; font-family: "FuturaStd", sans-serif; }
  .card { background: #fff; border: 1.5px solid #231F20; width: 160px; display: flex; flex-direction: column; box-shadow: 4px 4px 0 #231F20; }
  .card-img { background: #f0f0f0; height: 120px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; border-bottom: 1.5px solid #231F20; }
  .card-img img { width: 100%; height: 100%; object-fit: contain; }
  .card-badge { position: absolute; top: 8px; left: 0; background: #FFD100; color: #231F20; font-family: "FuturaStdCondensed", sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; padding: 2px 8px; }
  .card-body { padding: 10px 10px 8px; display: flex; flex-direction: column; gap: 4px; }
  .card-name { font-family: "FuturaStdCondensed", sans-serif; font-weight: 700; font-size: 14px; text-transform: uppercase; color: #231F20; letter-spacing: 0.01em; line-height: 1.1; }
  .card-sub { font-size: 10px; color: #888; letter-spacing: 0.05em; text-transform: uppercase; }
  .card-price { font-family: "FuturaStdCondensed", sans-serif; font-weight: 900; font-size: 20px; color: #231F20; letter-spacing: -0.01em; margin-top: 4px; }
  .card-footer { border-top: 1.5px solid #231F20; display: flex; }
  .card-btn { flex: 1; background: #FFD100; border: none; color: #231F20; font-family: "FuturaStd", sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px; cursor: pointer; }
  .card-icon { width: 36px; border-left: 1.5px solid #231F20; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
  <div class="card">
    <div class="card-img">
      <img src="../assets/product-rollers.png" alt="Rollers">
      <div class="card-badge">Nuevo</div>
    </div>
    <div class="card-body">
      <div class="card-name">Stark Billionz</div>
      <div class="card-sub">Rollers Adultos</div>
      <div class="card-price">$ 349.000</div>
    </div>
    <div class="card-footer">
      <button class="card-btn">Agregar</button>
      <div class="card-icon">♡</div>
    </div>
  </div>
  <div class="card">
    <div class="card-img" style="background:#231F20;">
      <div style="font-family:'FuturaStdCondensed',sans-serif;font-weight:900;font-size:32px;color:#FFD100;text-transform:uppercase;">RUEDAS</div>
    </div>
    <div class="card-body">
      <div class="card-name">Pack Ruedas 80mm</div>
      <div class="card-sub">Accesorios</div>
      <div class="card-price">$ 89.000</div>
    </div>
    <div class="card-footer">
      <button class="card-btn">Agregar</button>
      <div class="card-icon">♡</div>
    </div>
  </div>
  <div class="card">
    <div class="card-img">
      <div style="font-family:'FuturaStdCondensed',sans-serif;font-weight:900;font-size:24px;color:#231F20;text-transform:uppercase;text-align:center;padding:8px;">Kit<br>Principiantes</div>
      <div class="card-badge" style="background:#231F20;color:#FFD100;">Oferta</div>
    </div>
    <div class="card-body">
      <div class="card-name">Kit Starter</div>
      <div class="card-sub">Rollers + Protecciones</div>
      <div class="card-price">$ 520.000</div>
    </div>
    <div class="card-footer">
      <button class="card-btn">Agregar</button>
      <div class="card-icon">♡</div>
    </div>
  </div>
</body>
</html>
