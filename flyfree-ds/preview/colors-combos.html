<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Color Combinations" subtitle="3 authorized pairings: Yellow+Black, Black+Yellow, White+accents" viewport="700x180" -->
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', sans-serif; background: #f0f0f0; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .combo { display: flex; align-items: center; padding: 16px 20px; gap: 16px; }
  .combo-label { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; }
  .combo-desc { font-size: 11px; letter-spacing: 0.05em; opacity: 0.7; margin-top: 2px; }
  .combo-sample { font-size: 22px; font-weight: 900; letter-spacing: -0.02em; text-transform: uppercase; margin-left: auto; }
  .c1 { background: #FFD100; color: #231F20; }
  .c2 { background: #231F20; color: #FFD100; }
  .c3 { background: #FFFFFF; color: #231F20; border: 1.5px solid #231F20; }
  .accent { color: #FFD100; }
</style>
</head>
<body>
  <div class="combo c1">
    <div>
      <div class="combo-label">Yellow + Black</div>
      <div class="combo-desc">Máxima energía · campañas · CTAs</div>
    </div>
    <div class="combo-sample">&gt;&gt; ROLL</div>
  </div>
  <div class="combo c2">
    <div>
      <div class="combo-label">Black + Yellow</div>
      <div class="combo-desc">Poder urbano · nocturno · headers</div>
    </div>
    <div class="combo-sample">&gt;&gt; FREE</div>
  </div>
  <div class="combo c3">
    <div>
      <div class="combo-label">White + Black <span class="accent">+ Yellow</span></div>
      <div class="combo-desc">Clean · ecommerce · producto</div>
    </div>
    <div class="combo-sample" style="font-size:18px;">Shop <span class="accent">&gt;&gt;</span></div>
  </div>
</body>
</html>
