<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: "FuturaStdCondensed"; src: url("../fonts/FuturaStd-CondensedExtraBd.otf") format("opentype"); font-weight: 900; }
  @font-face { font-family: "FuturaStdCondensed"; src: url("../fonts/FuturaStd-CondensedBold.otf") format("opentype"); font-weight: 700; }
  @font-face { font-family: "FuturaStd"; src: url("../fonts/FuturaStd-Book.otf") format("opentype"); font-weight: 400; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "FuturaStd", sans-serif; background: #231F20; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
  .header { display: flex; align-items: baseline; gap: 12px; }
  .kicker { font-family: "FuturaStdCondensed", sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: #888; }
  .group { display: flex; flex-direction: column; gap: 4px; }
  .grp-label { font-family: "FuturaStd", sans-serif; font-size: 9px; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase; color: #FFD100; margin-bottom: 2px; }
  /* Italic — oblique skew gives the athletic "Nike" forward lean */
  .italic { font-family: "FuturaStdCondensed", sans-serif; font-weight: 900; text-transform: uppercase; color: #FFD100; letter-spacing: -0.01em; line-height: 0.92; transform: skewX(-12deg); transform-origin: left bottom; display: inline-block; }
  .italic-white { color: #FFFFFF; }
  /* Speed-line variant: motion streaks behind the word */
  .speed-wrap { position: relative; display: inline-block; padding-left: 4px; }
  .speed-wrap::before { content: ""; position: absolute; left: -18px; top: 18%; width: 14px; height: 60%; background: repeating-linear-gradient(to bottom, #FFD100 0, #FFD100 3px, transparent 3px, transparent 7px); transform: skewX(-12deg); }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .upright { font-family: "FuturaStdCondensed", sans-serif; font-weight: 900; text-transform: uppercase; color: #fff; letter-spacing: -0.01em; line-height: 0.92; }
  .vs { font-family: "FuturaStd", sans-serif; font-size: 9px; color: #666; letter-spacing: 0.1em; text-transform: uppercase; }
  .divider { height: 1px; background: rgba(255,255,255,0.12); margin: 2px 0; }
</style>
</head>
<body>
  <div class="header">
    <span class="kicker">Italic / Oblique · skew −12° · estilo deportivo</span>
  </div>

  <!-- Hero italic specimen -->
  <div class="group">
    <div class="grp-label">Display Italic</div>
    <div class="speed-wrap"><span class="italic" style="font-size:64px;">Always</span></div>
  </div>

  <div class="divider"></div>

  <!-- Italic scale ramp -->
  <div class="group">
    <div class="grp-label">Escala Italic</div>
    <div class="row"><span class="italic" style="font-size:40px;">Rolleando</span></div>
    <div class="row"><span class="italic italic-white" style="font-size:30px;">La calle es tuya</span></div>
    <div class="row"><span class="italic" style="font-size:22px;">Born to roll</span></div>
  </div>

  <div class="divider"></div>

  <!-- Upright vs Italic comparison -->
  <div class="group">
    <div class="grp-label">Recta vs Italic</div>
    <div class="row" style="gap:24px;">
      <span class="upright" style="font-size:32px;">Free</span>
      <span class="vs">→</span>
      <span class="speed-wrap"><span class="italic" style="font-size:32px;">Free</span></span>
    </div>
  </div>
</body>
</html>
