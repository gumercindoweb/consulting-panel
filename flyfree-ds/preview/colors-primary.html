<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Primary Color Palette" subtitle="Amarillo #FFD100 · Negro #231F20 · Blanco #FFFFFF" viewport="700x180" -->
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', sans-serif; background: #f5f5f5; padding: 20px; }
  .row { display: flex; gap: 0; height: 120px; }
  .swatch { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; }
  .swatch-yellow { background: #FFD100; }
  .swatch-black { background: #231F20; }
  .swatch-white { background: #FFFFFF; border: 1.5px solid #231F20; }
  .label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
  .hex { font-size: 13px; font-weight: 400; margin-top: 2px; opacity: 0.7; }
  .on-dark { color: #FFFFFF; }
  .on-light { color: #231F20; }
  .name-row { display: flex; gap: 8px; margin-top: 12px; }
  .name-tag { background: #231F20; color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; padding: 4px 8px; }
  .name-tag.yellow { background: #FFD100; color: #231F20; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch swatch-yellow">
      <div class="label on-light">Amarillo FlyFree</div>
      <div class="hex on-light">#FFD100</div>
    </div>
    <div class="swatch swatch-black">
      <div class="label on-dark">Negro FlyFree</div>
      <div class="hex on-dark">#231F20</div>
    </div>
    <div class="swatch swatch-white">
      <div class="label on-light">Blanco</div>
      <div class="hex on-light">#FFFFFF</div>
    </div>
  </div>
  <div class="name-row">
    <div class="name-tag yellow">Primary</div>
    <div class="name-tag">Dark</div>
    <div class="name-tag" style="background:#fff;color:#231F20;border:1.5px solid #231F20;">Light</div>
  </div>
</body>
</html>
