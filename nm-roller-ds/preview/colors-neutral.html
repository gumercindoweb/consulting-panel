<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family:'Futura Std'; src:url('../fonts/FuturaStd-Bold.otf') format('opentype'); font-weight:700; }
  @font-face { font-family:'Futura Std'; src:url('../fonts/FuturaStd-Book.otf') format('opentype'); font-weight:400; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; display:flex; align-items:stretch; min-height:140px; font-family:'Futura Std',sans-serif; }
  .swatch { flex:1; display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; min-height:120px; }
  .name { font-weight:700; font-size:8px; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:2px; }
  .hex { font-weight:400; font-size:8px; opacity:0.7; }
</style>
</head>
<body>
  <div class="swatch" style="background:#F4F4F4"><span class="name" style="color:#111">100</span><span class="hex" style="color:#111">#F4F4F4</span></div>
  <div class="swatch" style="background:#E0E0E0"><span class="name" style="color:#111">200</span><span class="hex" style="color:#111">#E0E0E0</span></div>
  <div class="swatch" style="background:#C0C0C0"><span class="name" style="color:#111">300</span><span class="hex" style="color:#111">#C0C0C0</span></div>
  <div class="swatch" style="background:#9A9A9A"><span class="name" style="color:#fff">400</span><span class="hex" style="color:#fff">#9A9A9A</span></div>
  <div class="swatch" style="background:#767676"><span class="name" style="color:#fff">500</span><span class="hex" style="color:#fff">#767676</span></div>
  <div class="swatch" style="background:#5A5A5A"><span class="name" style="color:#fff">600</span><span class="hex" style="color:#fff">#5A5A5A</span></div>
  <div class="swatch" style="background:#404040"><span class="name" style="color:#fff">700</span><span class="hex" style="color:#fff">#404040</span></div>
  <div class="swatch" style="background:#2C2C2C"><span class="name" style="color:#fff">800</span><span class="hex" style="color:#fff">#2C2C2C</span></div>
  <div class="swatch" style="background:#1A1A1A"><span class="name" style="color:#fff">900</span><span class="hex" style="color:#fff">#1A1A1A</span></div>
  <div class="swatch" style="background:#111111"><span class="name" style="color:#fff">Black</span><span class="hex" style="color:#fff">#111111</span></div>
</body>
</html>
