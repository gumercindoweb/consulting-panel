<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family:'Futura Std'; src:url('../fonts/FuturaStd-Bold.otf') format('opentype'); font-weight:700; }
  @font-face { font-family:'Futura Std'; src:url('../fonts/FuturaStd-ExtraBold.otf') format('opentype'); font-weight:900; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; display:flex; align-items:center; justify-content:center; min-height:200px; gap:48px; padding:32px; }
  .logo-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .logo-wrap img { width:120px; height:120px; object-fit:contain; }
  .logo-dark { background:#111; padding:16px; border-radius:0; }
  .logo-light { background:#fff; padding:16px; }
  .logo-red { background:#D01C1F; padding:16px; }
  label { font-family:'Futura Std',sans-serif; font-weight:700; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:#666; }
</style>
</head>
<body>
  <div class="logo-wrap">
    <div class="logo-dark"><img src="../assets/Logo NM Roller.png" alt="NM Roller Logo"></div>
    <label>Fondo oscuro</label>
  </div>
  <div class="logo-wrap">
    <div class="logo-light"><img src="../assets/Logo NM Roller.png" alt="NM Roller Logo"></div>
    <label>Fondo blanco</label>
  </div>
  <div class="logo-wrap">
    <div class="logo-red"><img src="../assets/Logo NM Roller.png" alt="NM Roller Logo"></div>
    <label>Fondo rojo</label>
  </div>
</body>
</html>
