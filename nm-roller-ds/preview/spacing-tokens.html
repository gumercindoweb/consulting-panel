<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family:'Futura Std'; src:url('../fonts/FuturaStd-Bold.otf') format('opentype'); font-weight:700; }
  @font-face { font-family:'Futura Std'; src:url('../fonts/FuturaStd-Book.otf') format('opentype'); font-weight:400; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; display:flex; align-items:flex-end; gap:0; padding:24px 24px 16px; font-family:'Futura Std',sans-serif; }
  .unit { display:flex; flex-direction:column; align-items:center; gap:6px; margin-right:12px; }
  .bar { background:oklch(50% 0.26 26); width:20px; }
  .token { font-weight:700; font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:#555; }
  .val { font-weight:400; font-size:8px; color:#3a3a3a; }
</style>
</head>
<body>
  <div class="unit"><div class="bar" style="height:4px"></div><div class="token">1</div><div class="val">4px</div></div>
  <div class="unit"><div class="bar" style="height:8px"></div><div class="token">2</div><div class="val">8px</div></div>
  <div class="unit"><div class="bar" style="height:12px"></div><div class="token">3</div><div class="val">12px</div></div>
  <div class="unit"><div class="bar" style="height:16px"></div><div class="token">4</div><div class="val">16px</div></div>
  <div class="unit"><div class="bar" style="height:20px"></div><div class="token">5</div><div class="val">20px</div></div>
  <div class="unit"><div class="bar" style="height:24px"></div><div class="token">6</div><div class="val">24px</div></div>
  <div class="unit"><div class="bar" style="height:32px"></div><div class="token">8</div><div class="val">32px</div></div>
  <div class="unit"><div class="bar" style="height:40px"></div><div class="token">10</div><div class="val">40px</div></div>
  <div class="unit"><div class="bar" style="height:48px"></div><div class="token">12</div><div class="val">48px</div></div>
  <div class="unit"><div class="bar" style="height:64px"></div><div class="token">16</div><div class="val">64px</div></div>
  <div class="unit"><div class="bar" style="height:80px"></div><div class="token">20</div><div class="val">80px</div></div>
  <div class="unit"><div class="bar" style="height:96px"></div><div class="token">24</div><div class="val">96px</div></div>
</body>
</html>
